version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: privygate
      MYSQL_USER: privygate
      MYSQL_PASSWORD: privygate
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://privygate:privygate@db:3306/privygate
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
    depends_on:
      - db
    command: sh -c "npx prisma migrate deploy && node server.js"

volumes:
  mysql_data:
